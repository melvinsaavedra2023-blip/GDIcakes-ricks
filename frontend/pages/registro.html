<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro | Cakes Rick's</title>

    <link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

    <div class="login-container">

        <h1>CAKES RICK'S</h1>

        <h2>Crear cuenta</h2>

        <form id="registroForm">

            <input
                type="text"
                id="nombre"
                placeholder="Nombre"
                required
            >

            <input
                type="text"
                id="apellido"
                placeholder="Apellido"
                required
            >

            <input
                type="email"
                id="correo"
                placeholder="Correo"
                required
            >

            <input
                type="text"
                id="usuario"
                placeholder="Usuario"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">

                Registrarme

            </button>

        </form>

        <p>

            ¿Ya tienes cuenta?

            <a href="login.html">

                Iniciar sesión

            </a>

        </p>

    </div>

    <script src="../assets/js/registro.js"></script>

</body>

</html>
